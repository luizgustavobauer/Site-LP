<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - LP Agência de Marketing</title>
    <link rel="stylesheet" href="../Compartilhar/shared.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar"></nav>

    <!-- Hero Section -->
    <section class="hero hero-secondary">
        <div class="hero-bg"></div>
        <div class="container">
            <div class="hero-content-centered fade-in-up">
                <h1 class="hero-title fade-in-up-delay-1">Nosso <span class="gradient-text">Blog</span></h1>
                <p class="hero-description fade-in-up-delay-2">Insights, tendências e estratégias de marketing digital</p>
            </div>
        </div>
    </section>

    <!-- Blog Posts -->
    <section class="blog-full">
        <div class="container">
            <div class="blog-grid-full" id="blogGridFull">
                <!-- Blog posts will be generated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Newsletter Section -->
    <section class="newsletter-section">
        <div class="container">
            <div class="newsletter-content fade-in">
                <h2>Receba nossas melhores dicas por email</h2>
                <p>Insights e estratégias direto na sua caixa de entrada</p>
                <form class="newsletter-form" id="newsletterForm">
                    <input type="email" placeholder="Seu melhor email" required>
                    <button type="submit" class="btn btn-primary hover-lift">
                        Se Inscrever <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- CTA Section -->
    <section class="cta-section">
        <div class="cta-bg"></div>
        <div class="container">
            <div class="cta-content fade-in">
                <h2 class="cta-title">Quer saber mais sobre como crescer?</h2>
                <p class="cta-description">Vamos conversar sobre sua estratégia de marketing. Entre em contato!</p>
                <a href="../Contato/contato.html" class="btn btn-large btn-primary hover-lift">
                    Agendar Conversa <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" id="footer"></footer>

    <script src="../Compartilhar/shared.js"></script>
    <script src="blog.js"></script>
</body>
</html>
